<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY SOCIAL MEDIA LINKS</title>
    <!-- Font Awesome សម្រាប់ទាញយក Logo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            margin: 15px 0;
            padding: 15px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .link-btn i {
            margin-right: 15px;
            font-size: 22px;
        }
        /* ពណ៌តាម App នីមួយៗពេល Hover */
        .facebook-btn:hover {
            background-color: #1877F2;
            color: white;
            transform: scale(1.05);
        }
        .tiktok-btn:hover {
            background-color: #010101;
            color: white;
            transform: scale(1.05);
        }
        .youtube-btn:hover {
            background-color: #FF0000;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MY SOCIAL LINKS</h1>
        
        <!-- FACEBOOK LINK -->
        <a href="https://www.facebook.com/share/1CVNEemB6B/?mibextid=wwXIfr" target="_blank" class="link-btn facebook-btn">
            <i class="fab fa-facebook"></i> FACEBOOK
        </a>

        <!-- TIKTOK LINK -->
        <a href="https://www.tiktok.com/@sonaakayongjx" target="_blank" class="link-btn tiktok-btn">
            <i class="fab fa-tiktok"></i> TIKTOK
        </a>

        <!-- YOUTUBE LINK -->
        <a href="https://www.youtube.com/@420sns" target="_blank" class="link-btn youtube-btn">
            <i class="fab fa-youtube"></i> YOUTUBE
        </a>
    </div>

</body>
</html>
